name: Build macOS desktop app

# Manual trigger only — macOS runners burn Actions minutes at a 10x multiplier,
# and this app doesn't need a build on every push yet.
on:
  workflow_dispatch: {}

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      # pnpm version comes from the "packageManager" field in package.json
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: client/src-tauri -> target

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      # bundle.targets in tauri.conf.json is "nsis" (Windows); override for macOS
      # bundles, mirroring scripts/package-desktop.mjs which does the same locally.
      # Updater artifacts need TAURI_SIGNING_PRIVATE_KEY; when the secret is not
      # configured, disable them (same fallback as scripts/package-desktop.mjs)
      # so the build still produces an installable .app/.dmg.
      - name: Build Tauri app (bundles the Node sidecar automatically)
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          extra_args=()
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "TAURI_SIGNING_PRIVATE_KEY secret not set — building without updater artifacts"
            extra_args=(--config '{"bundle":{"createUpdaterArtifacts":false}}')
          fi
          pnpm --filter client exec tauri build --bundles app,dmg "${extra_args[@]}"

      - name: Upload dmg
        uses: actions/upload-artifact@v4
        with:
          name: agent-flow-macos-dmg
          path: client/src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - name: Upload .app bundle
        uses: actions/upload-artifact@v4
        with:
          name: agent-flow-macos-app
          path: client/src-tauri/target/release/bundle/macos/*.app
          if-no-files-found: error
